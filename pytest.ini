[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    property_test: Property-based tests
    integration: Integration tests

# Coverage
addopts = 
    -v
    --strict-markers
    --tb=short

# Hypothesis settings
hypothesis_profile = default

[hypothesis]
max_examples = 100
deadline = None
